<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nonso Duaka | Terminal Portfolio</title>

  <!-- SEO & Social -->
  <meta name="description" content="Nonso Duaka - Computational Biology & ML Researcher. Interactive terminal portfolio.">
  <meta property="og:title" content="Nonso Duaka | Terminal Portfolio">
  <meta property="og:description" content="Computational Biology & ML Researcher. Explore my work via an interactive terminal.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Nonso Duaka | Terminal Portfolio">
  <meta name="twitter:description" content="Computational Biology & ML Researcher. Interactive terminal portfolio.">

  <!-- Terminal emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0e14;
      height: 100%;
      overflow: hidden;
    }
    #terminal-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .xterm { padding: 10px; }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #39c5bb;
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      z-index: 10;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading.hidden { display: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="loading">Connecting...</div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const term = new Terminal({
      theme: {
        background: '#0a0e14',
        foreground: '#b3b1ad',
        cursor: '#0a0e14',
        cursorAccent: '#0a0e14',
        cyan: '#39c5bb',
        yellow: '#f29718',
        green: '#aad94c',
        blue: '#59c2ff',
        magenta: '#d2a6ff',
        red: '#ff3333',
        white: '#e6e1cf',
        brightBlack: '#626a73',
      },
      fontFamily: "'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace",
      fontSize: window.innerWidth < 600 ? 10 : 14,
      cursorBlink: false,
      cursorStyle: 'bar',
      disableStdin: false,
      allowTransparency: true,
      scrollback: 0,
      linkHandler: {
        activate: (e, uri) => { window.open(uri, '_blank'); }
      },
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    try {
      const unicode11Addon = new Unicode11Addon.Unicode11Addon();
      term.loadAddon(unicode11Addon);
      term.unicode.activeVersion = '11';
    } catch (e) {
      console.warn('Unicode11 addon failed to load:', e);
    }
    try {
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();
      term.loadAddon(webLinksAddon);
    } catch (e) {
      console.warn('WebLinks addon failed to load:', e);
    }

    const container = document.getElementById('terminal-container');
    term.open(container);
    fitAddon.fit();
    term.focus();

    // WebSocket connection
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      document.getElementById('loading').classList.add('hidden');
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      term.focus();
    };

    ws.onmessage = (event) => {
      term.write(event.data);
    };

    ws.onclose = () => {
      term.write('\r\n\x1b[33mConnection closed. Refresh to reconnect.\x1b[0m\r\n');
    };

    // Send key events
    term.onKey(({ domEvent }) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'key', key: domEvent.key }));
      }
    });

    // Handle resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      }, 150);
    });

    // Touch/swipe support for mobile
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 30) return; // ignore taps
      if (ws.readyState !== WebSocket.OPEN) return;
      if (absDx > absDy) {
        // Horizontal swipe → switch tabs
        ws.send(JSON.stringify({ type: 'key', key: dx > 0 ? 'ArrowLeft' : 'ArrowRight' }));
      } else {
        // Vertical swipe → scroll
        ws.send(JSON.stringify({ type: 'key', key: dy > 0 ? 'ArrowUp' : 'ArrowDown' }));
      }
    }, { passive: true });

    // Focus terminal on any click
    document.addEventListener('click', () => term.focus());
  </script>
</body>
</html>
