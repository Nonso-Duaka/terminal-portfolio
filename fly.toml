app = 'nonso-terminal'
primary_region = 'ord'

[build]

[env]
  WEB_PORT = '3000'
  SSH_PORT = '2222'

# Web (HTTP) service
[[services]]
  internal_port = 3000
  protocol = 'tcp'
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

# SSH (TCP) service
[[services]]
  internal_port = 2222
  protocol = 'tcp'
  auto_stop_machines = 'stop'
  auto_start_machines = true

  [[services.ports]]
    port = 2222
    handlers = []

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
